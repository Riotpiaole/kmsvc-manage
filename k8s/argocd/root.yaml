apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kmsvc-root
  namespace: cicd
spec:
  project: kmsvc
  source:
    repoURL: https://forgejo.riotpiao.homelab.com/rock/kafaka-management-service.git
    targetRevision: main
    path: k8s/argocd/apps
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: cicd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
